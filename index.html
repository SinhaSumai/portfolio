<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sumaiya Sinha — ML Engineer</title>
<meta name="description" content="Sumaiya Sinha — Machine Learning Engineer working in computer vision, multimodal AI, and NLP. Portfolio and CV." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23000000'/%3E%3Ctext x='50' y='66' font-size='52' font-family='monospace' fill='%234ade80' text-anchor='middle'%3E&gt;_%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="terminal" id="terminal">

  <div class="titlebar">
    <div class="dots">
      <button class="dot red" data-action="close" aria-label="Close terminal" title="Close"></button>
      <button class="dot yellow" data-action="minimize" aria-label="Minimize terminal" title="Minimize"></button>
      <button class="dot green" data-action="maximize" aria-label="Maximize terminal" title="Maximize"></button>
    </div>
    <div class="titlebar-title">sumaiya@portfolio: ~</div>
    <div class="titlebar-spacer" aria-hidden="true"></div>
  </div>

  <nav class="tabs" id="tabs" aria-label="Sections">
    <button data-cmd="about">about</button>
    <button data-cmd="projects">projects</button>
    <button data-cmd="experience">experience</button>
    <button data-cmd="education">education</button>
    <button data-cmd="skills">skills</button>
    <button data-cmd="contact">contact</button>
  </nav>

  <main class="screen" id="screen" tabindex="-1"></main>

  <div class="inputline">
    <span class="prompt">sumaiya@portfolio:~$</span>
    <input id="cmd-input" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" aria-label="Terminal command input" />
  </div>

</div>

<div class="closed-screen" id="closed-screen" hidden>
  <p>&gt;_ session terminated</p>
  <button class="btn" id="reopen-btn">relaunch terminal</button>
</div>

<button class="min-tab" id="min-tab" hidden aria-label="Restore terminal" title="Restore terminal">
  <span class="dot-mini"></span> sumaiya@portfolio
</button>

<script src="script.js"></script>
</body>
</html>
